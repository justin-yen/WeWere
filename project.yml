name: WeWere
options:
  bundleIdPrefix: com.wewere
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  WeWere:
    type: application
    platform: iOS
    sources:
      - WeWere
    resources:
      - WeWere/Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: WeWere/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wewere.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "WeWere needs camera access to capture event photos"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "WeWere needs photo library access to save developed photos"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "WeWere needs photo library access to save developed photos"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Supabase
